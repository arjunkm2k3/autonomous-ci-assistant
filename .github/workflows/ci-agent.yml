name: AI Pipeline Assistant

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          sudo systemctl start ollama
          sudo systemctl status ollama || true

      - name: Wait for Ollama server to be ready
        run: |
          echo "Waiting for Ollama server to start..."
          for i in {1..60}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✅ Ollama server is ready! (Attempt $i)"
              break
            fi
            echo "⏳ Attempt $i/60 - Ollama not ready yet..."
            sleep 3
          done

      - name: Pull Ollama model
        run: ollama pull gemma:2b

      - name: Verify model is available
        run: ollama list

      - name: Ingest knowledge
        run: python ingest_knowledge.py
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          REPO_NAME: ${{ github.repository }}
          OLLAMA_MODEL: gemma:2b

      - name: Create logs directory and dummy file
        if: always()
        run: |
          mkdir -p logs
          echo "No logs generated yet" > logs/dummy.log

      - name: Simulate build (fails)
        id: build
        run: |
          echo "🚀 Building..."
          echo "ERROR: ModuleNotFoundError: No module named 'requests'"
          exit 1
        continue-on-error: true

      - name: Run AI Assistant if build failed
        if: steps.build.outcome == 'failure'
        continue-on-error: true
        run: python -W ignore orchestrator.py --source github
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          REPO_NAME: ${{ github.repository }}
          OLLAMA_MODEL: gemma:2b

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assistant-logs
          path: logs/