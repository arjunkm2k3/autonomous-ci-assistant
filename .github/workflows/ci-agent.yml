name: AI Pipeline Assistant

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Setup Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          ollama pull llama2
      
      - name: Ingest knowledge
        run: python ingest_knowledge.py
      
      - name: Simulate build (fails)
        id: build
        run: |
          echo "🚀 Building..."
          echo "ERROR: ModuleNotFoundError: No module named 'requests'"
          exit 1
        continue-on-error: true
      
      - name: Run AI Assistant if build failed
        if: steps.build.outcome == 'failure'
        run: python orchestrator.py --source github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: assistant-logs
          path: logs/